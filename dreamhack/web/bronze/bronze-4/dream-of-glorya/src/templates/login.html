<!DOCTYPE html>
<html>
<head>
    <title>TRAUMA TEAM - LOGIN</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <script>
          {% for message in messages %} alert("{{ message }}"); {% endfor %}
        </script>
      {% endif %}
    {% endwith %}

    <div class="login-wrapper">
        <div class="login-box">
            <h2>MEDICAL PORTAL</h2>
            <p style="font-size: 12px; color: #666; margin-bottom: 20px;">Identity Verification Required</p>
            <form method="POST">
                <input name="id" placeholder="Username" style="width: 100%; box-sizing: border-box;" required>
                <input name="pw" type="password" placeholder="Password" style="width: 100%; box-sizing: border-box;" required>
                <button type="submit" style="width: 100%;">SECURE LOGIN</button>
            </form>
        </div>
    </div>
</body>
</html>
