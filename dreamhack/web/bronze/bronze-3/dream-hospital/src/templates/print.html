<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>드림 병원 | 검진 결과표 인쇄</title>
    <style>
        body { font-family: 'Times New Roman', serif; padding: 40px; color: #333; }
        .certificate { border: 2px solid #000; padding: 50px; width: 700px; margin: 0 auto; position: relative; }
        .title { text-align: center; font-size: 32px; font-weight: bold; margin-bottom: 50px; }
        .item { margin-bottom: 25px; border-bottom: 1px dotted #ccc; padding-bottom: 10px; }
        .item label { display: inline-block; width: 120px; font-weight: bold; }
        .seal { position: absolute; bottom: 50px; right: 80px; width: 100px; height: 100px; border: 3px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #e74c3c; transform: rotate(-15deg); font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <div class="certificate">
        <div class="title">건 강 검 진 결 과 표</div>
        <div class="item"><label>성 명:</label><span>{{ data.name }}</span></div>
        <div class="item"><label>검진일자:</label><span>{{ data.date }}</span></div>
        <div class="item"><label>검진내용:</label><span>{{ data.diagnosis }}</span></div>
        <div class="item" style="height: 100px;"><label>종합판정:</label><span>{{ data.summary }}</span></div>
        <br><br>
        <div style="text-align: center; font-size: 18px;">위와 같이 검진 결과를 증명합니다.</div>
        <br>
        <div style="text-align: center; font-size: 20px; font-weight: bold;">드림 병원 종합검진센터 귀하</div>
        <div class="seal">인</div>
    </div>
    <script>window.print();</script>
</body>
</html>
