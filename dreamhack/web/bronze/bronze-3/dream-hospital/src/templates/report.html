<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>드림 병원 | 검진 리포트</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding: 50px; }
        .report-box { background: white; max-width: 800px; margin: 0 auto; padding: 40px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 5px solid #3498db; }
        h2 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-top: 0; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .data-item { padding: 15px; background: #f1f4f6; border-radius: 5px; }
        .data-item label { display: block; color: #7f8c8d; font-size: 13px; margin-bottom: 5px; }
        .data-item span { font-weight: bold; color: #34495e; font-size: 18px; }
        .summary-box { background: #fffde7; padding: 20px; border-left: 5px solid #f1c40f; margin-top: 20px; }
        .footer-nav { margin-top: 40px; text-align: center; }
        .btn-print { padding: 12px 30px; background: #34495e; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="report-box">
        <h2>📊 건강검진 결과 상세 리포트</h2>
        <div class="data-grid">
            <div class="data-item"><label>성함</label><span>{{ data.name }}</span></div>
            <div class="data-item"><label>검진일자</label><span>{{ data.date }}</span></div>
            <div class="data-item"><label>신장/체중</label><span>{{ data.height }} / {{ data.weight }}</span></div>
            <div class="data-item"><label>혈압</label><span>{{ data.blood_pressure }}</span></div>
        </div>
        <div class="summary-box">
            <strong>의사 소견:</strong><br>
            <p>{{ data.diagnosis }}</p>
        </div>
        <div style="margin-top:20px; color:#555;">
            <strong>전체 요약:</strong> {{ data.summary }}
        </div>
    </div>
    <div class="footer-nav">
        <a href="/report/download/{{ user_hash }}" class="btn-print">결과표 인쇄/다운로드</a>
        <br><br>
        <a href="/dashboard" style="color:#7f8c8d; text-decoration:none;">목록으로 돌아가기</a>
    </div>
</body>
</html>
