<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>드림 병원 | 로그인</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .login-card h2 { color: #2c3e50; margin-bottom: 25px; }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        .login-card button:hover { background: #2980b9; }
        .info { font-size: 13px; color: #7f8c8d; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🏥 드림 병원</h2>
        <form action="/auth/login" method="post">
            <input type="text" name="username" placeholder="아이디">
            <input type="password" name="password" placeholder="비밀번호">
            <button type="submit">시스템 접속</button>
        </form>
        <div class="info">
            본 시스템은 검증된 의료진 및 환자만 이용 가능합니다.
        </div>
    </div>
</body>
</html>
